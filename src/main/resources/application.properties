spring.application.name=facturaexpress

# Fuente de datos con pool HikariCP (auto-configurado por spring-boot-starter-jdbc)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/factura_express_db}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# Excluir auto-configuración MVC (usamos servlets Jakarta, no controllers Spring)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.web.servlet.WebMvcAutoConfiguration
