spring.application.name=facturaexpress

# Fuente de datos con pool HikariCP (auto-configurado por spring-boot-starter-jdbc)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/factura_express_db}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:JlJ020912#*}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Email (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

