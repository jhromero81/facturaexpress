$kind: http-request
url: "{{base_url}}/usuarios?action=guardar"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  action: guardar
body:
  type: urlencoded
  content:
    action: guardar
    _csrf_token: "{{csrf_token}}"
    username: vendedor_test
    nombre: Vendedor Test Postman
    email: vendedor_test@correo.com
    rol: VENDEDOR
    password: Password123
scripts:
  - type: afterResponse
    code: |-
      pm.test('Usuario creado exitosamente', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 302, 303]);
      });
    language: text/javascript
order: 2000
