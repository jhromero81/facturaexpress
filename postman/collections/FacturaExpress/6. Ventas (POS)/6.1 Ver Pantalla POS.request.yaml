$kind: http-request
url: "{{base_url}}/ventas"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Estado 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Pantalla POS cargada', function () {
          var html = pm.response.text();
          pm.expect(html).to.include('Punto de Venta');
      });

      var html = pm.response.text();
      var match = html.match(/name="_csrf_token"\s+value="([^"]+)"/);
      if (match && match[1]) {
          pm.collectionVariables.set('csrf_token', match[1]);
      }
    language: text/javascript
order: 1000
