$kind: http-request
url: "{{base_url}}/clientes?action=nuevo"
method: GET
queryParams:
  action: nuevo
scripts:
  - type: afterResponse
    code: |-
      pm.test('Estado 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Muestra formulario de cliente', function () {
          var html = pm.response.text();
          pm.expect(html).to.include('cliente-form');
      });

      // Extraer CSRF token del formulario
      var html = pm.response.text();
      var match = html.match(/name="_csrf_token"\s+value="([^"]+)"/);
      if (match && match[1]) {
          pm.collectionVariables.set('csrf_token', match[1]);
      }
    language: text/javascript
order: 2000
