$kind: http-request
url: "{{base_url}}/clientes?action=actualizar"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  action: actualizar
body:
  type: urlencoded
  content:
    action: actualizar
    _csrf_token: "{{csrf_token}}"
    id: "1"
    nombre: Cliente Actualizado Postman
    email: actualizado@correo.com
    telefono: "3109876543"
    direccion: "Carrera 10 #20-30, Medellin"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Redireccion despues de actualizar', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 302, 303]);
      });

      pm.test('Cliente actualizado', function () {
          if (pm.response.code === 302 || pm.response.code === 303) {
              var loc = pm.response.headers.get('Location');
              pm.expect(loc).to.include('/clientes');
          }
      });
    language: text/javascript
order: 5000
