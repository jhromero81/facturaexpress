$kind: http-request
url: "{{base_url}}/clientes?action=eliminar&id=999"
method: GET
queryParams:
  action: eliminar
  id: "999"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Redireccion despues de eliminar', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 302, 303]);
      });

      pm.test('Redirige a lista de clientes', function () {
          if (pm.response.code === 302 || pm.response.code === 303) {
              var loc = pm.response.headers.get('Location');
              pm.expect(loc).to.include('/clientes');
          }
      });
    language: text/javascript
order: 6000
