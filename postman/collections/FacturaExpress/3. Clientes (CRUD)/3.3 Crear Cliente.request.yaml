$kind: http-request
url: "{{base_url}}/clientes?action=guardar"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  action: guardar
body:
  type: urlencoded
  content:
    action: guardar
    _csrf_token: "{{csrf_token}}"
    nombre: Cliente Postman Test
    email: cliente_test@correo.com
    telefono: "3001234567"
    direccion: "Calle 123 #45-67, Bogota"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Redireccion despues de crear cliente', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 302, 303]);
      });

      pm.test('Cliente creado exitosamente', function () {
          if (pm.response.code === 302 || pm.response.code === 303) {
              var loc = pm.response.headers.get('Location');
              pm.expect(loc).to.include('/clientes');
          }
      });
    language: text/javascript
examples: .resources/3.3 Crear Cliente.resources/examples
order: 3000
