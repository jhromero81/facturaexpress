$kind: http-request
url: "{{base_url}}/logs?tabla=facturas"
method: GET
queryParams:
  tabla: facturas
scripts:
  - type: afterResponse
    code: |-
      pm.test('Estado 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Logs filtrados por tabla', function () {
          var html = pm.response.text();
          pm.expect(html).to.include('logs');
      });
    language: text/javascript
order: 2000
