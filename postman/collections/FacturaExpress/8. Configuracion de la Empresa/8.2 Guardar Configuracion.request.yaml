$kind: http-request
url: "{{base_url}}/configuracion"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    _csrf_token: "{{csrf_token}}"
    nit: 900123456-7
    razonSocial: Mi Empresa SAS
    emailFacturacion: facturacion@miempresa.com
    telefono: "6012345678"
    direccion: "Av Siempre Viva #123"
    resolucionDian: RES-2026-12345
    certificadoVence: 2027-12-31
    notifEmail: "true"
    alertasDian: "true"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Configuracion guardada exitosamente', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 302, 303]);
      });

      pm.test('Respuesta JSON exitosa', function () {
          if (pm.response.code === 200) {
              try {
                  var json = pm.response.json();
                  pm.expect(json.success).to.be.true;
              } catch(e) {
                  // Puede ser redirect en lugar de JSON
              }
          }
      });
    language: text/javascript
order: 2000
