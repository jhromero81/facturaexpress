$kind: http-request
url: "{{base_url}}/facturas?action=detalle&id=1"
method: GET
queryParams:
  action: detalle
  id: "1"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Estado 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Detalle de factura cargado', function () {
          var html = pm.response.text();
          pm.expect(html).to.include('factura-detalle');
      });

      var html = pm.response.text();
      var match = html.match(/name="_csrf_token"\s+value="([^"]+)"/);
      if (match && match[1]) {
          pm.collectionVariables.set('csrf_token', match[1]);
      }
    language: text/javascript
order: 4000
