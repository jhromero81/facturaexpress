$kind: http-request
url: "{{base_url}}/errores?tipo=dian"
method: GET
queryParams:
  tipo: dian
scripts:
  - type: afterResponse
    code: |-
      pm.test('Estado 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Pagina de errores filtrada', function () {
          var html = pm.response.text();
          pm.expect(html).to.include('errores');
      });
    language: text/javascript
order: 2000
