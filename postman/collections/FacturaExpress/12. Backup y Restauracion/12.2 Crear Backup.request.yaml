$kind: http-request
url: "{{base_url}}/backup?action=crear"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  action: crear
body:
  type: urlencoded
  content:
    action: crear
    _csrf_token: "{{csrf_token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Backup creado exitosamente', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 302, 303]);
      });

      pm.test('Redirige con mensaje de exito', function () {
          if (pm.response.code === 302 || pm.response.code === 303) {
              var loc = pm.response.headers.get('Location');
              pm.expect(loc).to.include('success=ok');
          }
      });
    language: text/javascript
order: 2000
