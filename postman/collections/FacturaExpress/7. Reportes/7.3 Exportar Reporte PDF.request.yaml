$kind: http-request
url: "{{base_url}}/reportes?action=exportarPdf"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  action: exportarPdf
body:
  type: urlencoded
  content:
    action: exportarPdf
    periodo: Enero - Diciembre 2026
scripts:
  - type: afterResponse
    code: |-
      pm.test('Respuesta es un PDF', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 302, 303]);
      });

      if (pm.response.code === 200) {
          pm.test('Content-Type es application/pdf', function () {
              var ct = pm.response.headers.get('Content-Type');
              if (ct) pm.expect(ct).to.include('pdf');
          });

          pm.test('Content-Disposition incluye attachment', function () {
              var cd = pm.response.headers.get('Content-Disposition');
              if (cd) pm.expect(cd).to.include('attachment');
          });
      }
    language: text/javascript
order: 3000
